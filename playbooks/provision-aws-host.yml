---
- name: Provision AWS EC2 host for Vault SSH demo
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Load credentials
      ansible.builtin.include_vars:
        file: "{{ item }}"
      with_first_found:
        - files: ["../.env", ".env"]
          skip: true

    - name: Load Vault CA public key
      ansible.builtin.set_fact:
        vault_ca_public_key: "{{ lookup('file', vault_ca_pubkey_file) }}"

  tasks:
    - name: Create EC2 key pair for initial provisioning
      amazon.aws.ec2_key:
        name: "{{ aws_keypair_name }}"
        region: "{{ aws_region }}"
        access_key: "{{ aws_access_key_id }}"
        secret_key: "{{ aws_secret_access_key }}"
        key_type: ed25519
        state: present
      register: ec2_key

    - name: Save private key to disk
      ansible.builtin.copy:
        content: "{{ ec2_key.key.private_key }}"
        dest: "{{ provisioning_key_file }}"
        mode: "0600"
      when: ec2_key.changed

    - name: Create security group for SSH
      amazon.aws.ec2_security_group:
        name: "{{ aws_security_group }}"
        description: "AAP Vault Demo - SSH access"
        vpc_id: "{{ aws_vpc_id }}"
        region: "{{ aws_region }}"
        access_key: "{{ aws_access_key_id }}"
        secret_key: "{{ aws_secret_access_key }}"
        rules:
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: 0.0.0.0/0
            rule_desc: SSH access
        rules_egress:
          - proto: all
            cidr_ip: 0.0.0.0/0
        state: present
      register: sg

    - name: Find latest RHEL 9 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        access_key: "{{ aws_access_key_id }}"
        secret_key: "{{ aws_secret_access_key }}"
        owners:
          - "309956199498"
        filters:
          name: "RHEL-9*_HVM-*-x86_64-*Hourly*"
          architecture: x86_64
          state: available
      register: rhel_amis

    - name: Select latest AMI
      ansible.builtin.set_fact:
        rhel9_ami: "{{ rhel_amis.images | sort(attribute='creation_date') | last }}"

    - name: Display selected AMI
      ansible.builtin.debug:
        msg: "Using AMI {{ rhel9_ami.image_id }} ({{ rhel9_ami.name }})"

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ aws_instance_name }}"
        region: "{{ aws_region }}"
        access_key: "{{ aws_access_key_id }}"
        secret_key: "{{ aws_secret_access_key }}"
        key_name: "{{ aws_keypair_name }}"
        instance_type: "{{ aws_instance_type }}"
        image_id: "{{ rhel9_ami.image_id }}"
        security_groups:
          - "{{ sg.group_id }}"
        vpc_subnet_id: "{{ aws_subnet_id }}"
        network:
          assign_public_ip: true
        wait: true
        state: running
        tags:
          Purpose: aap-vault-demo
          ManagedBy: ansible
      register: ec2

    - name: Set EC2 host IP fact
      ansible.builtin.set_fact:
        ec2_host_ip: "{{ ec2.instances[0].public_ip_address }}"

    - name: Save EC2 host IP to file
      ansible.builtin.copy:
        content: "{{ ec2_host_ip }}"
        dest: "{{ ec2_host_ip_file }}"
        mode: "0644"

    - name: Display EC2 instance info
      ansible.builtin.debug:
        msg: "EC2 instance {{ ec2.instances[0].instance_id }} running at {{ ec2_host_ip }}"

    - name: Wait for SSH to be available
      ansible.builtin.wait_for:
        host: "{{ ec2_host_ip }}"
        port: 22
        delay: 15
        timeout: 300

    - name: Add EC2 host to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ ec2_host_ip }}"
        groups: vault_demo_hosts
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "{{ provisioning_key_file }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

- name: Configure EC2 host to trust Vault CA
  hosts: vault_demo_hosts
  become: true
  gather_facts: false

  tasks:
    - name: Wait for system to be ready
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: Copy Vault CA public key to host
      ansible.builtin.copy:
        content: "{{ hostvars['localhost']['vault_ca_public_key'] }}"
        dest: /etc/ssh/trusted-user-ca-keys.pem
        mode: "0644"
        owner: root
        group: root

    - name: Configure sshd to trust Vault CA certificates
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        line: "TrustedUserCAKeys /etc/ssh/trusted-user-ca-keys.pem"
        regexp: "^#?TrustedUserCAKeys"
        state: present
      notify: Restart sshd

    - name: Ensure ec2-user exists and has a home directory
      ansible.builtin.user:
        name: ec2-user
        state: present

    - name: Verify sshd config is valid
      ansible.builtin.command: sshd -t
      changed_when: false

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted
